query list {
    gale {
        list (
            token: "$GITHUB_TOKEN",
            repo: "aweris/gale"
        )
    }
}

query run {
    gale {
        run(
            workflow: "Master",
            token: "$GITHUB_TOKEN",
            repo: "kubernetes/minikube",
            job: "lint"
            debug: true
        )
    }
}